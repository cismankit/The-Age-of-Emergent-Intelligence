  <body>
    <div id="root">
      <!-- First-paint loader — replaced the instant React mounts -->
      <style>
        .boot {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 14px;
          background: #f4f1ea;
          font-family: Georgia, serif;
          color: #8b919c;
        }
        .boot-mark {
          width: 44px;
          height: 44px;
          border-radius: 50%;
          border: 2px solid #ddd8ce;
          border-top-color: #b45309;
          animation: boot-spin 0.8s linear infinite;
        }
        @keyframes boot-spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="boot">
        <div class="boot-mark"></div>
        <span style="font-size: 14px; letter-spacing: 0.08em">EMERGENCE</span>
