<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0f14"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#b45309" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#b45309" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="white" fill-opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Network lines (decorative) -->
  <g stroke="white" stroke-opacity="0.08" stroke-width="1" fill="none">
    <line x1="200" y1="150" x2="400" y2="280"/>
    <line x1="400" y1="280" x2="650" y2="200"/>
    <line x1="650" y1="200" x2="850" y2="340"/>
    <line x1="850" y1="340" x2="1000" y2="220"/>
    <line x1="200" y1="420" x2="450" y2="360"/>
    <line x1="450" y1="360" x2="700" y2="440"/>
    <line x1="700" y1="440" x2="950" y2="380"/>
    <line x1="400" y1="280" x2="450" y2="360"/>
    <line x1="650" y1="200" x2="700" y2="440"/>
    <line x1="850" y1="340" x2="950" y2="380"/>
  </g>

  <!-- Network nodes -->
  <g fill="white" fill-opacity="0.15">
    <circle cx="200" cy="150" r="5"/>
    <circle cx="400" cy="280" r="7"/>
    <circle cx="650" cy="200" r="6"/>
    <circle cx="850" cy="340" r="8"/>
    <circle cx="1000" cy="220" r="5"/>
    <circle cx="200" cy="420" r="6"/>
    <circle cx="450" cy="360" r="5"/>
    <circle cx="700" cy="440" r="7"/>
    <circle cx="950" cy="380" r="5"/>
  </g>
  <!-- Highlighted accent nodes -->
  <g fill="#f59e0b" fill-opacity="0.7">
    <circle cx="400" cy="280" r="4"/>
    <circle cx="850" cy="340" r="4"/>
    <circle cx="700" cy="440" r="4"/>
  </g>

  <!-- Left vertical rule -->
  <rect x="80" y="80" width="2" height="470" fill="#f59e0b" fill-opacity="0.4" rx="1"/>

  <!-- Corner marks -->
  <g stroke="white" stroke-opacity="0.2" stroke-width="1.5" fill="none">
    <polyline points="80,80 80,110 110,110"/>
    <polyline points="1120,80 1120,110 1090,110"/>
    <polyline points="80,550 80,520 110,520"/>
    <polyline points="1120,550 1120,520 1090,520"/>
  </g>

  <!-- Label: field guide -->
  <text x="104" y="162" font-family="'IBM Plex Mono', monospace" font-size="13" letter-spacing="0.16em" fill="white" fill-opacity="0.35" text-transform="uppercase">AN ILLUSTRATED FIELD GUIDE TO MULTI-AGENT AI</text>

  <!-- Main title -->
  <text x="104" y="290" font-family="Georgia, serif" font-size="76" font-weight="600" fill="white" fill-opacity="0.95" letter-spacing="-0.02em">The Age of</text>
  <text x="104" y="385" font-family="Georgia, serif" font-size="76" font-weight="600" letter-spacing="-0.02em">
    <tspan fill="#f59e0b">Emergent</tspan>
    <tspan fill="white" fill-opacity="0.95"> Intelligence</tspan>
  </text>

  <!-- Tagline -->
  <text x="104" y="450" font-family="'IBM Plex Sans', sans-serif" font-size="22" fill="white" fill-opacity="0.5">25 chapters · live simulations · practical frameworks · free to read</text>

  <!-- Domain badge -->
  <rect x="104" y="490" width="180" height="36" rx="18" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="194" y="513" font-family="'IBM Plex Mono', monospace" font-size="13" fill="white" fill-opacity="0.6" text-anchor="middle" letter-spacing="0.06em">robotbod.ai</text>
</svg>
